<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f4f4f4;
            color: #333;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

            a:hover {
                text-decoration: underline;
            }

        .call-to-action { /* Style for the call to action */
            margin-top: 30px; /* Add some spacing above the call to action */
        }

        .cta-contact-info {
            font-size: 1.2em;
        }

        .phone-link {
            color: #007bff;
            text-decoration: none;
        }

            .phone-link:hover {
                text-decoration: underline;
            }


        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            p {
                font-size: 1em;
            }

            .cta-contact-info {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Oops! The page you're looking for can't be found.</p>
    <p>Go back to the <a href="/">homepage</a>.</p>

    <div class="call-to-action">
        <p class="cta-contact-info">Need help? Call us: <a href="tel:+19197803481" class="phone-link">(919) 780-3481</a></p>
    </div>

</body>
</html>
